{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | HexaQuébec</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary:#00bfff;
  --gold:#c6a87d;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b132b;
  color:white;
}

/* ===== HERO ANIMÉ ===== */
.hero-contact{
  position:relative;
  min-height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

/* image animée */
.hero-contact::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("{% static 'images/contact-bg.png' %}") center/cover no-repeat;
  animation:zoomBg 18s infinite alternate ease-in-out;
}

.hero-contact::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

@keyframes zoomBg{
  0%{transform:scale(1);}
  50%{transform:scale(1.12) translate(-10px,-10px);}
  100%{transform:scale(1.18) translate(10px,10px);}
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero-title{
  font-size:3rem;
  font-weight:700;
}

.hero-title span{
  color:var(--gold);
}

/* ===== SECTION ===== */
.contact-section{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:2rem;
  padding:4rem 1rem;
}

/* ===== INFOS ===== */
.info-item{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  text-align:center;
  backdrop-filter:blur(10px);
  transition:0.3s;
  width:250px;
}

.info-item:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(0,191,255,0.3);
}

.info-item i{
  font-size:1.6rem;
  color:var(--primary);
  margin-bottom:10px;
}

/* ===== FORM ===== */
.contact-form{
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  width:100%;
  max-width:520px;
}

.input-group{
  position:relative;
  margin-bottom:15px;
}

.input-group i{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

.form-control{
  padding-left:40px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
}

.form-control:focus{
  border:1px solid var(--primary);
  box-shadow:0 0 10px var(--primary);
}

/* ===== BUTTON ===== */
.btn-send{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00bfff,#00f0ff);
  font-weight:600;
  transition:0.3s;
}

.btn-send:hover{
  transform:scale(1.05);
}

/* ===== BACK BUTTON ===== */
.btn-back{
  display:inline-block;
  margin-top:15px;
  padding:10px 15px;
  border-radius:10px;
  border:1px solid #c6a87d;
  color:#c6a87d;
  text-decoration:none;
  transition:0.3s;
}

.btn-back:hover{
  background:#c6a87d;
  color:#0b132b;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  padding:12px 18px;
  border-radius:10px;
  background:linear-gradient(45deg,#00bfff,#00f0ff);
  color:white;
  font-weight:600;
  opacity:0;
  transform:translateY(-20px);
  transition:0.4s;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.toast.error{
  background:linear-gradient(45deg,#ff4d4d,#ff0000);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hero-title{font-size:2rem;}
}
</style>
</head>

<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- HERO -->
<section class="hero-contact">
  <div class="hero-content">
    <h1 class="hero-title">
      Contactez <span>HexaQuébec</span>
    </h1>

    <p>Nous sommes disponibles pour vous répondre rapidement</p>

    <div style="margin-top:10px;">
      Merci !
    </div>

    <!-- bouton retour -->
    <a href="{% url 'home' %}" class="btn-back">
      ⬅ Retour à l'accueil
    </a>
  </div>
</section>

<!-- CONTACT -->
<section class="contact-section">

  <!-- INFOS -->
  <div class="d-flex flex-column gap-3">

    <div class="info-item">
      <i class="fas fa-map-marker-alt"></i>
      <h6>Adresse</h6>
      <p>Chicoutimi, Québec</p>
    </div>

    <div class="info-item">
      <i class="fas fa-phone"></i>
      <h6>Téléphone</h6>
      <p>+1 514 467 7377</p>
    </div>

    <div class="info-item">
      <i class="fas fa-envelope"></i>
      <h6>Email</h6>
      <p>hexaquebec80@gmail.com</p>
    </div>

  </div>

  <!-- FORM -->
  <div class="contact-form">
    <h4 class="text-center mb-3" style="color:#00bfff;">Envoyer un message</h4>

    <form method="POST">
      {% csrf_token %}

      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="nom" class="form-control" placeholder="Nom complet">
      </div>

      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" class="form-control" placeholder="Email">
      </div>

      <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="text" name="telephone" class="form-control" placeholder="Téléphone">
      </div>

      <div class="input-group">
        <i class="fas fa-comment"></i>
        <textarea name="message" class="form-control" rows="4" placeholder="Votre message"></textarea>
      </div>

      <button class="btn-send">
        <i class="fas fa-paper-plane"></i> Envoyer
      </button>

    </form>
  </div>

</section>

<script>
const form = document.querySelector("form");
const toast = document.getElementById("toast");

function showToast(msg,type="success"){
  toast.innerText = msg;
  toast.classList.add("show");

  if(type==="error"){
    toast.classList.add("error");
  }

  setTimeout(()=>{
    toast.classList.remove("show","error");
  },3000);
}

form.addEventListener("submit",function(e){
  let ok=true;

  form.querySelectorAll("input,textarea").forEach(f=>{
    if(!f.value.trim()){
      ok=false;
      f.style.border="1px solid red";
    } else {
      f.style.border="none";
    }
  });

  if(!ok){
    e.preventDefault();
    showToast("⚠️ Tous les champs sont obligatoires","error");
  } else {
    showToast("✅ Message envoyé avec succès !");
  }
});
</script>

</body>
</html>
