

{% block content %}

<h2>Votre panier</h2>

<table class="table">

<tr>
<th>Produit</th>
<th>Prix</th>
<th>Quantité</th>
<th>Total</th>
<th></th>
</tr>

{% for item in cart.items.all %}

<tr>

<td>{{ item.product.title }}</td>

<td>{{ item.product.price }} $</td>

<td>{{ item.quantity }}</td>

<td>{{ item.total_price }} $</td>

<td>
<a href="{% url 'remove_from_cart' item.id %}">
Supprimer
</a>
</td>

</tr>

{% endfor %}

</table>

<h3>Total : {{ total }} $</h3>

<a href="#" class="btn btn-success">
Payer maintenant
</a>

{% endblock %}
