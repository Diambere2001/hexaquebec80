<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Session expirée</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
        }

        p {
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }

        .btn-custom {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-login {
            background: #4f46e5;
            border: none;
        }

        .btn-login:hover {
            background: #4338ca;
        }

        .btn-home {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-home:hover {
            background: rgba(255,255,255,0.1);
        }

        .small-text {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="icon">⚠️</div>

    <h1>Session client expirée</h1>

    <p>
        Votre session a expiré ou votre compte client n’est pas disponible.
        Veuillez vous reconnecter pour continuer.
    </p>

    <a href="{% url 'client_login' %}" class="btn btn-custom btn-login">
        🔐 Se reconnecter
    </a>

    <a href="{% url 'home' %}" class="btn btn-custom btn-home">
        🏠 Retour accueil
    </a>

    <div class="small-text">
        HexaQuébec • Sécurité & protection des sessions
    </div>

</div>

</body>
</html>
