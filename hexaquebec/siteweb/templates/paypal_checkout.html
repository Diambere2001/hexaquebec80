{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PayPal Checkout | HexaQuébec</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg:#0b132b;
    --card-bg:rgba(255,255,255,0.05);
    --accent:#c6a87d;
    --text:#f1f5f9;
    --muted:#94a3b8;
}

body{
    background: linear-gradient(-45deg, #0b132b, #1c2541, #3a506b, #0b132b);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: var(--text);
    font-family:'Poppins',sans-serif;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.paypal-card{
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 40px;
    max-width: 450px;
    margin: 80px auto;
    text-align: center;
    transition: 0.4s;
}

.paypal-card:hover{
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2{
    color: var(--accent);
    font-weight: 700;
}

.subtitle{
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
}

input{
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
    outline: none;
    text-align: center;
    font-weight: 600;
}

.btn-hexa{
    background: linear-gradient(135deg,#c6a87d,#e8c395);
    border: none;
    color: #0b132b;
    font-weight: 700;
    border-radius: 25px;
    padding: 12px;
    width: 100%;
    transition: 0.3s;
}

.btn-hexa:hover{
    transform: scale(1.03);
}

.quick{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.quick button{
    flex:1;
    border-radius:10px;
    border:none;
    padding:8px;
    background:rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}

.quick button:hover{
    background:var(--accent);
    color:#0b132b;
}

/* 🚫 BOUTON ANNULER */
.btn-cancel{
    display:block;
    margin-top:12px;
    padding:12px;
    border-radius:25px;
    text-decoration:none;
    text-align:center;
    background:rgba(255,255,255,0.08);
    color:#f1f5f9;
    border:1px solid rgba(255,255,255,0.15);
    font-weight:600;
    transition:0.3s;
}

.btn-cancel:hover{
    background:rgba(255,255,255,0.18);
    transform:scale(1.02);
}
</style>
</head>

<body>

<div class="paypal-card">

    <h2>💰 Paiement PayPal</h2>
    <p class="subtitle">Choisissez ou entrez votre montant</p>

    <form method="POST" action="{% url 'paypal_payment' %}">
        {% csrf_token %}

        <!-- QUICK AMOUNT -->
        <div class="quick">
            <button type="button" onclick="setAmount(10)">10$</button>
            <button type="button" onclick="setAmount(25)">25$</button>
            <button type="button" onclick="setAmount(50)">50$</button>
        </div>

        <input type="number" name="amount" placeholder="Ex: 50 CAD" required>

        <button class="btn-hexa" type="submit">
            Continuer vers PayPal →
        </button>

        <!-- 🚫 ANNULER -->
        <a href="{% url 'client_profile' %}" class="btn-cancel">
            Annuler
        </a>

    </form>

</div>

<script>
function setAmount(val){
    document.querySelector("input[name='amount']").value = val;
}
</script>

</body>
</html>
