{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer un compte client | HexaQuébec</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
:root{
    --bg:#0b132b;
    --accent:#c6a87d;
}

/* ===== GLOBAL ===== */
body{
    background: linear-gradient(145deg,#0b132b,#1c2541);
    font-family: 'Poppins', sans-serif;
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
}

/* ===== CARD ===== */
.register-box{
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:35px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    transition:0.3s;
}

.register-box:hover{
    transform:translateY(-5px);
    box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

/* ===== HEADER ===== */
.header-box{
    text-align:center;
    margin-bottom:25px;
}

.header-icon{
    width:65px;
    height:65px;
    border-radius:50%;
    background:linear-gradient(135deg,#c6a87d,#e0c097);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:26px;
    color:#0b132b;
    box-shadow:0 10px 25px rgba(198,168,125,0.5);
}

.header-box h2{
    margin-top:15px;
    font-size:1.8rem;
    font-weight:700;
    color:var(--accent);
}

.header-box p{
    font-size:0.95rem;
    color:#cbd5e1;
}

/* ===== INPUT ===== */
.form-label{
    font-size:0.9rem;
    color:#ddd;
}

.form-control{
    border-radius:12px;
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(198,168,125,0.5);
    color:#fff;
    padding:12px;
    transition:0.3s;
}

.form-control:focus{
    background: rgba(255,255,255,0.12);
    box-shadow:0 0 0 2px #c6a87d;
    border:none;
}

.form-control::placeholder{
    color:rgba(255,255,255,0.6);
}

/* ===== BUTTON ===== */
.btn-hexa{
    background: linear-gradient(135deg,#c6a87d,#e0c097);
    color:#0b132b;
    font-weight:700;
    border-radius:30px;
    padding:12px;
    width:100%;
    transition:0.3s;
}

.btn-hexa:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:0 15px 30px rgba(198,168,125,0.5);
}

/* ===== LINK ===== */
.login-link a{
    color:#c6a87d;
    text-decoration:none;
}
.login-link a:hover{
    text-decoration:underline;
}

/* ===== FIX CARD MOBILE PRO ===== */
@media (max-width: 576px){

    body{
        display:block; /* 🔥 enlève le centrage vertical qui agrandit */
    }

    .container{
        padding: 20px 10px;
    }

    .register-box{
        max-width: 320px; /* 🔥 largeur petite */
        margin: auto;
        padding: 16px 14px; /* 🔥 réduit fortement */
        border-radius: 14px;
    }

    /* HEADER */
    .header-icon{
        width: 45px;
        height: 45px;
        font-size: 18px;
    }

    .header-box h2{
        font-size: 1.2rem;
        margin-top: 8px;
    }

    .header-box p{
        font-size: 0.75rem;
        margin-bottom: 10px;
    }

    /* INPUT */
    .form-control{
        padding: 9px;
        font-size: 0.8rem;
    }

    .form-label{
        font-size: 0.75rem;
    }

    /* BUTTON */
    .btn-hexa{
        padding: 9px;
        font-size: 0.8rem;
    }

    /* LINK */
    .login-link{
        font-size: 0.75rem;
    }
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-12 col-sm-10 col-md-7 col-lg-4">

<div class="register-box" data-aos="zoom-in">

<!-- HEADER -->
<div class="header-box">
    <div class="header-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>
    <h2>Créer un compte</h2>
    <p>Rejoignez HexaQuébec et commencez votre projet </p>
</div>

<!-- Messages -->
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} text-center">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
    <label class="form-label">Nom de l’entreprise</label>
    <input type="text" name="entreprise" class="form-control" placeholder="Ex: HexaQuébec" required>
</div>

<div class="mb-3">
    <label class="form-label">Personne contact</label>
    <input type="text" name="nom" class="form-control" placeholder="Ex: Abdoulaye Kamara" required>
</div>

<div class="mb-3">
    <label class="form-label">Adresse complète</label>
    <input type="text" name="adresse" class="form-control" placeholder="Ex: Montréal, Canada" required>
</div>

<div class="mb-3">
    <label class="form-label">Courriel</label>
    <input type="email" name="email" class="form-control" placeholder="Ex: contact@email.com" required>
</div>

<div class="mt-4">
    <button type="submit" class="btn btn-hexa">
        <i class="fa-solid fa-paper-plane"></i> Créer mon compte
    </button>
</div>

<p class="text-center mt-3 login-link">
    Déjà un compte ?
    <a href="{% url 'client_login' %}">Se connecter</a>
</p>

</form>

</div>

</div>
</div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

<script>
AOS.init({ duration: 800 });
</script>

</body>
</html>
