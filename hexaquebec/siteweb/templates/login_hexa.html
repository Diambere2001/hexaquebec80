{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion | HexaQuébec</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */
body{
    margin:0;
    padding:0;
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#23395d 0%,transparent 35%),
    radial-gradient(circle at bottom right,#3c1874 0%,transparent 35%),
    linear-gradient(135deg,#0b132b,#1c2541,#0f172a);

    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* ================= BACKGROUND GLOW ================= */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#e0c097;
    filter:blur(180px);
    opacity:0.15;
    top:-150px;
    right:-120px;
    animation:floatGlow 8s ease-in-out infinite;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00b4d8;
    filter:blur(180px);
    opacity:0.12;
    bottom:-120px;
    left:-120px;
    animation:floatGlow 10s ease-in-out infinite;
}

@keyframes floatGlow{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(25px);
    }
    100%{
        transform:translateY(0px);
    }
}

/* ================= LOGIN CARD ================= */
.login-card{
    width:100%;
    max-width:430px;
    padding:45px 35px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    box-shadow:
    0 15px 45px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.05);

    position:relative;
    z-index:10;

    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= LOGO ================= */
.logo-box{
    width:90px;
    height:90px;
    margin:auto;

    border-radius:24px;

    background:linear-gradient(135deg,#e0c097,#c49a6c);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 10px 30px rgba(224,192,151,0.35);

    margin-bottom:25px;

    animation:pulseLogo 3s infinite;
}

.logo-box i{
    font-size:42px;
    color:#0b132b;
}

@keyframes pulseLogo{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

/* ================= TITLES ================= */
.login-title{
    text-align:center;
    font-size:2rem;
    font-weight:700;
    color:white;
    margin-bottom:8px;
}

.login-subtitle{
    text-align:center;
    color:#94a3b8;
    font-size:0.95rem;
    margin-bottom:30px;
}

/* ================= INPUT ================= */
.input-group-modern{
    position:relative;
    margin-bottom:20px;
}

.input-group-modern i{
    position:absolute;
    top:50%;
    left:18px;
    transform:translateY(-50%);
    color:#cbd5e1;
    z-index:5;
}

.form-control{
    height:58px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);

    background:rgba(255,255,255,0.06);

    color:white;

    padding-left:52px;

    transition:0.3s ease;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-control:focus{
    background:rgba(255,255,255,0.08);
    border-color:#e0c097;

    color:white;

    box-shadow:
    0 0 0 4px rgba(224,192,151,0.12);

    transform:translateY(-2px);
}

/* ================= BUTTON ================= */
.btn-login{
    width:100%;
    height:58px;

    border:none;
    border-radius:18px;

    background:linear-gradient(135deg,#e0c097,#c49a6c);

    color:#0b132b;
    font-weight:700;
    font-size:1rem;

    transition:0.35s ease;

    margin-top:10px;

    box-shadow:
    0 10px 25px rgba(224,192,151,0.3);
}

.btn-login:hover{
    transform:translateY(-3px) scale(1.01);

    box-shadow:
    0 18px 35px rgba(224,192,151,0.45);

    color:#0b132b;
}

/* ================= SECURITY ================= */
.security-box{
    margin-top:25px;

    padding:14px;

    border-radius:16px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.06);

    font-size:0.88rem;
    color:#cbd5e1;

    display:flex;
    align-items:flex-start;
    gap:10px;
}

.security-box i{
    color:#e0c097;
    font-size:1rem;
    margin-top:2px;
}

/* ================= FOOTER ================= */
.footer-text{
    margin-top:22px;
    text-align:center;
    color:#64748b;
    font-size:0.8rem;
}

/* ================= RESPONSIVE ================= */
@media(max-width:576px){

    body{
        padding:20px;
    }

    .login-card{
        padding:35px 25px;
    }

    .login-title{
        font-size:1.7rem;
    }

}

</style>
</head>

<body>

<div class="login-card">

    <!-- LOGO -->
    <div class="logo-box">
        <i class="bi bi-shield-lock-fill"></i>
    </div>

    <!-- TITLE -->
    <h1 class="login-title">
        HexaQuébec
    </h1>

    <p class="login-subtitle">
        Plateforme sécurisée de connexion
    </p>

    <!-- FORM -->
    <form method="POST">

        {% csrf_token %}

        <!-- USERNAME -->
        <div class="input-group-modern">

            <i class="bi bi-person-fill"></i>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Nom d'utilisateur"
                required
            >

        </div>

        <!-- PASSWORD -->
        <div class="input-group-modern">

            <i class="bi bi-lock-fill"></i>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Mot de passe"
                required
            >

        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn btn-login">

            <i class="bi bi-box-arrow-in-right"></i>
            Se connecter

        </button>

    </form>

    <!-- SECURITY -->
    <div class="security-box">

        <i class="bi bi-exclamation-triangle-fill"></i>

        <div>
            Accès réservé aux utilisateurs autorisés.
            Toute tentative non autorisée peut être enregistrée.
        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer-text">

        © 2026 HexaQuébec • Québec, Canada 🇨🇦

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
