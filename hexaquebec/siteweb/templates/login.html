{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Client - HexaQuébec</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{font-family:'Poppins',sans-serif;}

body{
    background:linear-gradient(to bottom right,#0b132b,#1c2541,#3a506b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* ===== CARD ===== */
.login-card{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(14px);
    border-radius:20px;
    padding:28px;
    width:100%;
    max-width:360px;
    border:1px solid rgba(198,168,125,0.3);
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* ===== HEADER ===== */
.login-header{
    text-align:center;
    margin-bottom:20px;
}

.login-icon{
    width:55px;
    height:55px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#c6a87d,#e8c395);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#0b132b;
}

.login-title{
    font-size:1.4rem;
    font-weight:700;
    color:#c6a87d;
    margin-top:10px;
}

/* ===== INPUT ===== */
.input-group{
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    border:1px solid rgba(198,168,125,0.3);
    overflow:hidden;
}

.input-group-text{
    background:transparent;
    border:none;
    color:#c6a87d;
}

.form-control{
    background:transparent;
    border:none;
    color:white;
    padding:10px;
    font-size:0.9rem;
}

.form-control:focus{
    box-shadow:none;
}

.form-control::placeholder{
    color:rgba(255,255,255,0.6);
}

/* ===== BUTTON ===== */
.btn-login{
    width:100%;
    padding:10px;
    border-radius:25px;
    background:linear-gradient(45deg,#c6a87d,#e8c395);
    border:none;
    color:#0b132b;
    font-weight:700;
    font-size:0.95rem;
    transition:0.3s;
}

.btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(198,168,125,0.6);
}

/* ===== INFO ===== */
.info-text{
    font-size:0.75rem;
    color:#facc15;
    text-align:center;
    margin-top:8px;
}

/* ===== LINK ===== */
.login-link{
    color:#c6a87d;
    font-weight:600;
    text-decoration:none;
}

.login-link:hover{
    color:#e8c395;
}

/* ===== MOBILE ===== */
@media(max-width:576px){
    body{
        align-items:flex-start;
        padding-top:40px;
    }

    .login-card{
        padding:18px 12px;
        max-width:300px;
    }

    .login-title{
        font-size:1.2rem;
    }
}
</style>
</head>

<body>

<div class="login-card">

<!-- HEADER -->
<div class="login-header">
    <div class="login-icon">
        <i class="fa-solid fa-user-lock"></i>
    </div>
    <div class="login-title">Connexion Client</div>
</div>

<!-- MESSAGES -->
{% if messages %}
{% for message in messages %}
<div class="alert alert-danger text-center">
    {{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST" autocomplete="off">
{% csrf_token %}

<!-- EMAIL -->
<div class="mb-3">
<label class="form-label text-light small">Adresse courriel</label>
<div class="input-group">
    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
    <input type="email"
           name="email"
           class="form-control"
           placeholder="exemple@gmail.com"
           required
           oninput="this.value = this.value.toLowerCase().trim()">
</div>
</div>

<!-- CODE -->
<div class="mb-2">
<label class="form-label text-light small">Code client</label>
<div class="input-group">
    <span class="input-group-text"><i class="fa fa-key"></i></span>
    <input type="text"
           name="client_code"
           class="form-control"
           placeholder="HEX-000000"
           required
           oninput="this.value = this.value.toUpperCase().trim()">
</div>
</div>

<div class="info-text">
📩 Vérifiez votre email pour votre code client
</div>

<button class="btn-login mt-3">
    <i class="fa-solid fa-right-to-bracket"></i> Connexion
</button>

<p class="text-center mt-3 text-light small">
    Pas encore de compte ?
    <a href="{% url 'client_register' %}" class="login-link">Créer un compte</a>
</p>

</form>

</div>

</body>
</html>
