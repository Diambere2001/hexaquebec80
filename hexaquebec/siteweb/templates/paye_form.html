{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Modifier Paiement | HexaQuébec
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- FontAwesome -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- AOS -->

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    rel="stylesheet">

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#020617;
            font-family:'Poppins',sans-serif;
            color:white;
            min-height:100vh;
        }

        .main-wrapper{
            padding:40px 20px;
        }

        .payment-edit-card{

            max-width:1000px;
            margin:auto;

            background:linear-gradient(145deg,#0f172a,#111827);

            border-radius:32px;

            padding:40px;

            border:1px solid rgba(255,255,255,0.05);

            box-shadow:0 15px 50px rgba(0,0,0,0.45);

            overflow:hidden;

            position:relative;
        }

        .payment-edit-card::before{

            content:"";

            position:absolute;

            top:-150px;
            right:-150px;

            width:300px;
            height:300px;

            background:rgba(37,99,235,0.15);

            border-radius:50%;
        }

        .payment-edit-card::after{

            content:"";

            position:absolute;

            bottom:-150px;
            left:-150px;

            width:300px;
            height:300px;

            background:rgba(59,130,246,0.12);

            border-radius:50%;
        }

        .edit-header{

            display:flex;
            justify-content:space-between;
            align-items:center;

            gap:20px;
            flex-wrap:wrap;

            margin-bottom:40px;

            position:relative;
            z-index:2;
        }

        .section-title{

            font-size:32px;
            font-weight:700;
            margin-bottom:8px;
        }

        .section-title i{
            color:#3b82f6;
            margin-right:10px;
        }

        .edit-subtitle{
            color:#94a3b8;
            font-size:15px;
        }

        .btn-return{

            background:#1e293b;
            color:white;

            border:none;

            padding:14px 22px;

            border-radius:16px;

            text-decoration:none;

            font-weight:600;

            transition:0.3s;
        }

        .btn-return:hover{

            background:#2563eb;
            color:white;

            transform:translateY(-3px);
        }

        .form-label{

            color:#cbd5e1;

            margin-bottom:10px;

            font-weight:600;
        }

        .modern-input{

            background:#1e293b !important;

            border:none !important;

            color:white !important;

            height:60px;

            border-radius:18px !important;

            padding-left:18px;

            margin-bottom:24px;

            transition:0.3s;
        }

        .modern-input::placeholder{
            color:#94a3b8;
        }

        .modern-input:focus{

            border:1px solid #2563eb !important;

            box-shadow:0 0 0 4px rgba(37,99,235,0.2) !important;
        }

        select.modern-input{
            cursor:pointer;
        }

        .button-zone{

            display:flex;

            gap:18px;

            margin-top:15px;

            flex-wrap:wrap;
        }

        .btn-save{

            flex:1;

            height:60px;

            border:none;

            border-radius:18px;

            background:linear-gradient(135deg,#2563eb,#1d4ed8);

            color:white;

            font-weight:700;

            transition:0.3s;
        }

        .btn-save:hover{

            transform:translateY(-3px);

            box-shadow:0 12px 25px rgba(37,99,235,0.35);

            color:white;
        }

        .btn-cancel{

            flex:1;

            height:60px;

            border-radius:18px;

            background:#334155;

            color:white;

            font-weight:700;

            display:flex;

            align-items:center;

            justify-content:center;

            text-decoration:none;

            transition:0.3s;
        }

        .btn-cancel:hover{

            background:#475569;

            color:white;

            transform:translateY(-3px);
        }

        .top-bar{

            max-width:1000px;
            margin:auto auto 25px auto;

            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
        }

        .logo-box{

            display:flex;
            align-items:center;
            gap:14px;
        }

        .logo-circle{

            width:55px;
            height:55px;

            border-radius:50%;

            background:linear-gradient(135deg,#2563eb,#1d4ed8);

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:24px;
            font-weight:700;
        }

        .logo-title{

            font-size:22px;
            font-weight:700;
        }

        .logo-sub{

            color:#94a3b8;
            font-size:13px;
        }

        .status-bar{

            background:#0f172a;

            border:1px solid rgba(255,255,255,0.05);

            padding:12px 18px;

            border-radius:16px;

            color:#cbd5e1;
        }

        .status-bar i{
            color:#22c55e;
            margin-right:8px;
        }

        @media(max-width:768px){

            .payment-edit-card{
                padding:25px;
            }

            .section-title{
                font-size:25px;
            }

            .button-zone{
                flex-direction:column;
            }

            .btn-save,
            .btn-cancel{
                width:100%;
            }

        }

    </style>

</head>

<body>

    <div class="main-wrapper">

        <!-- TOP BAR -->

        <div class="top-bar">

            <div class="logo-box">

                <div class="logo-circle">
                    H
                </div>

                <div>

                    <div class="logo-title">
                        HexaQuébec
                    </div>

                    <div class="logo-sub">
                        Gestion intelligente des paiements
                    </div>

                </div>

            </div>

            <div class="status-bar">

                <i class="fa-solid fa-shield-halved"></i>

                Paiement sécurisé administrateur

            </div>

        </div>

        <!-- CARD -->

        <div class="payment-edit-card"
        data-aos="zoom-in">

            <!-- HEADER -->

            <div class="edit-header">

                <div>

                    <h2 class="section-title">

                        <i class="fa-solid fa-pen-to-square"></i>

                        Modifier paiement client

                    </h2>

                    <p class="edit-subtitle">

                        Modifier les informations du paiement du client HexaQuébec

                    </p>

                </div>

                <a href="{% url 'dashboard_hexa' %}"
                class="btn-return">

                    <i class="fa-solid fa-arrow-left"></i>

                    Retour dashboard

                </a>

            </div>

            <!-- FORM -->

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <!-- NOM -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Nom client

                        </label>

                        <input type="text"
                        name="nom_client"
                        value="{{ paye.nom_client }}"
                        class="form-control modern-input"
                        placeholder="Nom du client"
                        required>

                    </div>

                    <!-- ENTREPRISE -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Entreprise

                        </label>

                        <input type="text"
                        name="entreprise"
                        value="{{ paye.entreprise }}"
                        class="form-control modern-input"
                        placeholder="Entreprise du client">

                    </div>

                    <!-- TELEPHONE -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Téléphone

                        </label>

                        <input type="text"
                        name="telephone"
                        value="{{ paye.telephone }}"
                        class="form-control modern-input"
                        placeholder="Téléphone">

                    </div>

                    <!-- RESIDENCE -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Résidence

                        </label>

                        <input type="text"
                        name="residence"
                        value="{{ paye.residence }}"
                        class="form-control modern-input"
                        placeholder="Résidence">

                    </div>

                    <!-- PROJET -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Projet

                        </label>

                        <input type="text"
                        name="titre_projet"
                        value="{{ paye.titre_projet }}"
                        class="form-control modern-input"
                        placeholder="Titre du projet">

                    </div>

                    <!-- MONTANT -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Montant $

                        </label>

                        <input type="number"
                        step="0.01"
                        name="montant"
                        value="{{ paye.montant }}"
                        class="form-control modern-input"
                        placeholder="Montant">

                    </div>

                    <!-- STATUT -->

                    <div class="col-md-12">

                        <label class="form-label">

                            Statut paiement

                        </label>

                        <select name="statut"
                        class="form-control modern-input">

                            <option value="paye"
                            {% if paye.statut == "paye" %}
                            selected
                            {% endif %}>

                                ✅ Payé

                            </option>

                            <option value="non_paye"
                            {% if paye.statut == "non_paye" %}
                            selected
                            {% endif %}>

                                ❌ Non payé

                            </option>

                        </select>

                    </div>

                </div>

                <!-- BUTTONS -->

                <div class="button-zone">

                    <button type="submit"
                    class="btn btn-save">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Enregistrer modifications

                    </button>

                    <a href="{% url 'dashboard_hexa' %}"
                    class="btn btn-cancel">

                        <i class="fa-solid fa-xmark"></i>

                        Annuler

                    </a>

                </div>

            </form>

        </div>

    </div>

    <!-- JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>

        AOS.init({
            duration:1000,
            once:true
        });

    </script>

</body>

</html>
