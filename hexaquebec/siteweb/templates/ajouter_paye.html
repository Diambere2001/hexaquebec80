<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<!-- AOS -->

<script>

AOS.init({
    duration:900,
    once:true
});

</script>

<!-- CHART FACTURES -->

<script>

const facturesLabels = JSON.parse('{{ factures_labels|safe }}');

const facturesData = JSON.parse('{{ factures_data|safe }}');

const ctx = document.getElementById('facturesChart');

if(ctx){

    new Chart(ctx, {

        type:'line',

        data:{

            labels:facturesLabels,

            datasets:[{

                label:'Factures',

                data:facturesData,

                borderColor:'#d4af37',

                backgroundColor:'rgba(212,175,55,0.2)',

                tension:0.4,

                fill:true,

                pointBackgroundColor:'#fff',

                pointRadius:5

            }]

        },

        options:{

            responsive:true,

            plugins:{

                legend:{

                    labels:{
                        color:'#fff'
                    }

                }

            },

            scales:{

                x:{

                    ticks:{
                        color:'#cbd5e1'
                    },

                    grid:{
                        color:'rgba(255,255,255,0.05)'
                    }

                },

                y:{

                    beginAtZero:true,

                    ticks:{
                        color:'#cbd5e1'
                    },

                    grid:{
                        color:'rgba(255,255,255,0.05)'
                    }

                }

            }

        }

    });

}

</script>

<!-- CHART PAIEMENT -->

<script>

const ctx2 = document.getElementById('payeChart');

if(ctx2){

    new Chart(ctx2, {

        type:'doughnut',

        data:{

            labels:['Payé','Non payé'],

            datasets:[{

                data:[

                    Number("{{ total_revenus|floatformat:2 }}"),

                    Number("{{ total_non_paye|floatformat:2 }}")

                ],

                backgroundColor:[

                    '#22c55e',
                    '#ef4444'

                ],

                borderWidth:0

            }]

        },

        options:{

            responsive:true,

            plugins:{

                legend:{

                    labels:{
                        color:'#fff'
                    }

                }

            }

        }

    });

}

</script>

<!-- TOGGLE PAYMENT FORM -->

<script>

function togglePaymentForm(event){

    event.preventDefault();

    const form = document.getElementById("payeForm");

    if(
        form.style.display === "none" ||
        form.style.display === ""
    ){

        form.style.display = "block";

        form.scrollIntoView({
            behavior:"smooth"
        });

    }else{

        form.style.display = "none";
    }

}

</script>

<!-- TOGGLE CLIENT INFO -->

<script>

function toggleInfo(id){

    let el = document.getElementById(id);

    if(el.style.display === "block"){

        el.style.display = "none";

    }else{

        el.style.display = "block";
    }

}

</script>

<!-- SEARCH CLIENT -->

<script>

function searchClient(){

    let input = document.getElementById("searchClient");

    let filter = input.value.toLowerCase();

    let cards = document.getElementsByClassName("client-box-item");

    for(let i = 0; i < cards.length; i++){

        let txt = cards[i].textContent || cards[i].innerText;

        if(txt.toLowerCase().indexOf(filter) > -1){

            cards[i].style.display = "";

        }else{

            cards[i].style.display = "none";
        }

    }

}

</script>

</body>

</html>
