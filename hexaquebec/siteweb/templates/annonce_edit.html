{% extends 'base.html' %}
{% block content %}

<style>

/* === THEME HEXAQUEBEC === */

:root{
    --bg:#0b1120;
    --card:#111827;
    --border:rgba(255,255,255,0.08);
    --text:#f8fafc;
    --muted:#94a3b8;
    --blue:#2563eb;
}

body{
    background:
    radial-gradient(circle at top left,#1e3a8a22,transparent 30%),
    radial-gradient(circle at bottom right,#d4af3722,transparent 30%),
    var(--bg);
    color:var(--text);
}

/* CONTAINER */
.edit-container{
    max-width:850px;
    margin:50px auto;
    padding:0 15px;
}

/* CARD */
.edit-card{
    background:rgba(17,24,39,0.92);
    border:1px solid var(--border);
    border-radius:24px;
    padding:30px;
    backdrop-filter:blur(12px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* TITLE */
.edit-title{
    font-size:26px;
    font-weight:800;
    margin-bottom:25px;
}

/* LABEL */
.form-label{
    font-size:13px;
    color:var(--muted);
    margin-bottom:6px;
    display:block;
}

/* INPUT */
.form-input, textarea{
    width:100%;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--border);
    background:#1e293b;
    color:#fff;
    outline:none;
    margin-bottom:16px;
    font-size:14px;
    transition:0.3s;
}

.form-input:focus, textarea:focus{
    border:1px solid var(--blue);
    box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

textarea{
    min-height:140px;
    resize:vertical;
}

/* IMAGE */
.image-preview{
    max-width:220px;
    border-radius:16px;
    margin-bottom:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* CHECKBOX */
.checkbox-container{
    display:flex;
    align-items:center;
    gap:10px;
    margin:15px 0 25px;
    color:var(--muted);
    font-size:14px;
}

/* BUTTON */
.btn-save{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-weight:700;
    font-size:15px;
    transition:0.3s;
    cursor:pointer;
}

.btn-save:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(37,99,235,0.35);
}

/* SMALL ANIMATION */
.edit-card{
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>

<div class="edit-container">

    <div class="edit-card">

        <div class="edit-title">✏ Modifier l’annonce</div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label class="form-label">Titre</label>
            <input type="text" name="title" value="{{ annonce.title }}" class="form-input">

            <label class="form-label">Contenu</label>
            <textarea name="content">{{ annonce.content }}</textarea>

            <label class="form-label">Image actuelle</label>

            {% if annonce.image %}
                <img src="{{ annonce.image.url }}" class="image-preview">
            {% endif %}

            <label class="form-label">Changer image</label>
            <input type="file" name="image" class="form-input">

            <div class="checkbox-container">
                <input type="checkbox" name="published"
                {% if annonce.published %}checked{% endif %}>
                <span>Publier cette annonce</span>
            </div>

            <button type="submit" class="btn-save">
                💾 Sauvegarder les modifications
            </button>

        </form>

    </div>

</div>

{% endblock %}
