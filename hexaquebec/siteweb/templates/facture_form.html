{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer Facture | HexaQuebec</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#0b132b,#1c2541);
    font-family:Poppins;
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.facture-container{
    width:900px;
    max-width:95%;
}

.facture-title{
    font-size:32px;
    font-weight:700;
    margin-bottom:30px;
    text-align:center;
    color:#c6a87d;
}

.form-control{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    padding:12px;
}

.form-control:focus{
    background:rgba(255,255,255,0.08);
    border-color:#c6a87d;
    box-shadow:none;
    color:white;
}

label{
    margin-bottom:5px;
    font-weight:500;
}

.row-form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.btn-hexa{
    background:#c6a87d;
    color:#0b132b;
    font-weight:600;
    padding:12px 35px;
    border-radius:30px;
    border:none;
    transition:0.3s;
}

.btn-hexa:hover{
    background:#d9b98f;
    transform:translateY(-2px);
}

#signature{
    border:1px solid rgba(255,255,255,0.2);
    width:100%;
    height:150px;
    border-radius:10px;
    background:white;
}

.signature-box{
    margin-top:10px;
}

.clear-btn{
    font-size:12px;
}

@media(max-width:768px){

.row-form{
grid-template-columns:1fr;
}

.facture-title{
font-size:26px;
}

}

/* MOBILE */

@media (max-width:768px){

.facture-title{
font-size:24px;
}

.form-grid{
grid-template-columns:1fr;
gap:15px;
}

#signature{
height:120px;
}

.btn-hexa{
width:100%;
}

}

/* TABLET */

@media (min-width:769px) and (max-width:1024px){

.facture-container{
max-width:700px;
}

.form-grid{
grid-template-columns:1fr 1fr;
}

}
</style>

</head>

<body>

<div class="facture-container">

<h2 class="facture-title">Créer une facture</h2>

<form method="POST">

{% csrf_token %}

<div class="row-form">

<div>
<label>Nom vendeur</label>
<input type="text" name="vendeur" class="form-control" required>
</div>

<div>
<label>Nom acheteur</label>
<input type="text" name="acheteur" class="form-control" required>
</div>

</div>

<br>

<div class="row-form">

<div>
<label>Produit vendu</label>
<input type="text" name="produit" class="form-control" required>
</div>

<div>
<label>Prix</label>
<input type="number" step="0.01" name="prix" class="form-control" required>
</div>

</div>

<br>

<div>
<label>Date</label>
<input type="date" name="date" class="form-control" required>
</div>

<br>

<div class="signature-box">

<label>Signature vendeur</label>

<canvas id="signature"></canvas>

<input type="hidden" name="signature" id="signatureInput">

<button type="button" id="clearSig" class="btn btn-light clear-btn mt-2">
Effacer signature
</button>

</div>

<div class="text-center mt-4">

<button type="submit" class="btn btn-hexa">
Créer la facture
</button>

</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>

var canvas = document.getElementById("signature");

var signaturePad = new SignaturePad(canvas,{
backgroundColor:'rgb(255,255,255)'
});

document.getElementById("clearSig").addEventListener("click",function(){
signaturePad.clear();
});

document.querySelector("form").addEventListener("submit",function(){

if(!signaturePad.isEmpty()){
document.getElementById("signatureInput").value = signaturePad.toDataURL();
}else{
document.getElementById("signatureInput").value = "";
}

});

</script>

</body>
</html>
