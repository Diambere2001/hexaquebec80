{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administration | Créer une facture</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

:root{
    --bg:#070f1d;
    --sidebar:#0f172a;
    --card:#111827;
    --card2:#172033;
    --border:rgba(255,255,255,0.08);
    --gold:#d4af37;
    --blue:#2563eb;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top left,#2563eb22,transparent 25%),
    radial-gradient(circle at bottom right,#d4af3722,transparent 25%),
    var(--bg);

    font-family:'Inter',sans-serif;
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    background:rgba(15,23,42,0.94);
    backdrop-filter:blur(12px);
    border-right:1px solid var(--border);
    padding:25px;
    z-index:1000;
}

.logo-box{
    text-align:center;
    margin-bottom:45px;
}

.logo-box img{
    width:90px;
    margin-bottom:12px;
}

.logo-box h3{
    font-size:24px;
    font-weight:700;
}

.logo-box span{
    color:var(--gold);
}

.sidebar-menu a{
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 18px;
    margin-bottom:12px;
    text-decoration:none;
    color:#cbd5e1;
    border-radius:16px;
    transition:0.3s;
    font-weight:500;
}

.sidebar-menu a:hover,
.sidebar-menu a.active{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    transform:translateX(5px);
}

/* MAIN */

.main-content{
    margin-left:260px;
    padding:35px;
}

/* TOPBAR */

.topbar{
    background:rgba(17,24,39,0.92);
    border:1px solid var(--border);
    border-radius:24px;
    padding:22px 28px;
    margin-bottom:35px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.topbar h1{
    font-size:32px;
    font-weight:700;
}

.topbar p{
    color:var(--muted);
    margin-top:6px;
}

.admin-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.admin-box img{
    width:55px;
    height:55px;
    border-radius:50%;
    border:2px solid var(--gold);
    object-fit:cover;
}

/* CARD */

.facture-card{
    background:rgba(17,24,39,0.95);
    border:1px solid var(--border);
    border-radius:28px;
    padding:40px;
    position:relative;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.facture-card::before{
    content:'';
    position:absolute;
    width:240px;
    height:240px;
    background:#2563eb18;
    border-radius:50%;
    top:-120px;
    right:-100px;
}

.facture-card::after{
    content:'';
    position:absolute;
    width:240px;
    height:240px;
    background:#d4af3715;
    border-radius:50%;
    bottom:-120px;
    left:-100px;
}

/* SECTION */

.section-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:22px;
    display:flex;
    align-items:center;
    gap:10px;
}

.section-title i{
    color:var(--gold);
}

/* GRID */

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

/* FORM */

.form-group{
    margin-bottom:22px;
    position:relative;
    z-index:2;
}

.form-label{
    margin-bottom:10px;
    font-weight:600;
    color:#e2e8f0;
}

.form-control{
    background:#172033 !important;
    border:1px solid rgba(255,255,255,0.06) !important;
    color:white !important;
    border-radius:18px !important;
    padding:15px 18px !important;
    transition:0.3s;
}

.form-control:focus{
    border-color:#2563eb !important;
    box-shadow:0 0 0 4px rgba(37,99,235,0.2) !important;
}

/* PRODUIT */

.product-card{
    background:#131d30;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:22px;
    padding:25px;
    margin-bottom:20px;
    position:relative;
    z-index:2;
}

.remove-product{
    position:absolute;
    top:18px;
    right:18px;
    background:#ef4444;
    border:none;
    width:38px;
    height:38px;
    border-radius:12px;
    color:white;
    transition:0.3s;
}

.remove-product:hover{
    background:#dc2626;
}

/* BUTTONS */

.btn-hexa{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border:none;
    color:white;
    border-radius:18px;
    padding:15px 28px;
    font-weight:700;
    transition:0.3s;
}

.btn-hexa:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(37,99,235,0.35);
}

.btn-add{
    background:#1e293b;
    color:white;
    border:none;
    border-radius:16px;
    padding:14px 22px;
    font-weight:600;
    transition:0.3s;
}

.btn-add:hover{
    background:#2563eb;
}

/* SIGNATURE */

.signature-container{
    background:#131d30;
    border-radius:24px;
    padding:25px;
    margin-top:10px;
    position:relative;
    z-index:2;
}

#signature{
    width:100%;
    height:180px;
    background:white;
    border-radius:18px;
    border:2px dashed #d1d5db;
}

.signature-actions{
    margin-top:15px;
}

/* TOTAL CARD */

.total-card{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border-radius:24px;
    padding:30px;
    margin-top:30px;
    text-align:center;
    position:relative;
    overflow:hidden;
}

.total-card::before{
    content:'';
    position:absolute;
    width:180px;
    height:180px;
    background:#ffffff12;
    border-radius:50%;
    top:-90px;
    right:-60px;
}

.total-card h2{
    font-size:42px;
    font-weight:700;
}

.total-card p{
    color:#dbeafe;
}

/* RESPONSIVE */

@media(max-width:992px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.main-content{
    margin-left:0;
    padding:20px;
}

.facture-card{
    padding:25px;
}

.topbar{
    gap:20px;
}

.topbar h1{
    font-size:26px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo-box">
        <img src="{% static 'images/logoHexa.png' %}">
        <h3>Hexa<span>Québec</span></h3>
    </div>

    <div class="sidebar-menu">

        <a href="{% url 'dashboard_hexa' %}">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>

        <a href="#" class="active">
            <i class="fa-solid fa-file-invoice"></i>
            Créer facture
        </a>

        <a href="{% url 'facture_list' %}">
            <i class="fa-solid fa-file-lines"></i>
            Factures
        </a>

    </div>

</div>

<!-- MAIN -->

<div class="main-content">

    <!-- TOPBAR -->

    <div class="topbar" data-aos="fade-down">

        <div>

            <h1>Créer une facture</h1>

            <p>
                Gestion professionnelle des factures HexaQuébec
            </p>

        </div>

        <div class="admin-box">

            <div class="text-end">

                <strong>{{ request.user.username }}</strong><br>

                <small class="text-secondary">
                    Administrateur
                </small>

            </div>

            <img src="{% static 'images/logoHexa.png' %}">

        </div>

    </div>

    <!-- CARD -->

    <div class="facture-card" data-aos="zoom-in">

        <form method="POST">

            {% csrf_token %}

            <!-- INFOS -->

            <h3 class="section-title">
                <i class="fa-solid fa-user-group"></i>
                Informations client
            </h3>

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label">
                        Nom vendeur
                    </label>

                    <input type="text"
                    name="vendeur"
                    class="form-control"
                    placeholder="HexaQuébec"
                    required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Nom acheteur
                    </label>

                    <input type="text"
                    name="acheteur"
                    class="form-control"
                    placeholder="Nom du client"
                    required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Adresse client
                    </label>

                    <input type="text"
                    name="adresse_client"
                    class="form-control"
                    placeholder="Adresse complète"
                    required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Ville
                    </label>

                    <input type="text"
                    name="ville_client"
                    class="form-control"
                    placeholder="Montréal"
                    required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Code postal
                    </label>

                    <input type="text"
                    name="code_postal_client"
                    class="form-control"
                    placeholder="H3W 1N3"
                    required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Pays
                    </label>

                    <input type="text"
                    name="pays_client"
                    class="form-control"
                    value="Canada">
                </div>

            </div>

            <!-- PRODUITS -->

            <div class="d-flex justify-content-between align-items-center mt-4 mb-4">

                <h3 class="section-title mb-0">
                    <i class="fa-solid fa-box"></i>
                    Produits
                </h3>

                <button type="button"
                onclick="ajouterProduit()"
                class="btn-add">

                <i class="fa-solid fa-plus"></i>
                Ajouter produit

                </button>

            </div>

            <div id="produits">

                <div class="product-card">

                    <div class="form-grid">

                        <div class="form-group">

                            <label class="form-label">
                                Produit
                            </label>

                            <input type="text"
                            name="produit[]"
                            class="form-control"
                            placeholder="Nom du produit"
                            required>

                        </div>

                        <div class="form-group">

                            <label class="form-label">
                                Quantité
                            </label>

                            <input type="number"
                            name="quantite[]"
                            class="form-control quantity"
                            value="1"
                            required>

                        </div>

                        <div class="form-group">

                            <label class="form-label">
                                Prix unitaire
                            </label>

                            <input type="number"
                            step="0.01"
                            name="prix_unitaire[]"
                            class="form-control price"
                            placeholder="0.00"
                            required>

                        </div>

                    </div>

                </div>

            </div>

            <!-- DATE -->

            <div class="form-group mt-4">

                <label class="form-label">
                    Date facture
                </label>

                <input type="date"
                name="date"
                class="form-control"
                required>

            </div>

            <!-- SIGNATURE -->

            <div class="signature-container">

                <h3 class="section-title">
                    <i class="fa-solid fa-signature"></i>
                    Signature vendeur
                </h3>

                <canvas id="signature"></canvas>

                <input type="hidden"
                name="signature"
                id="signatureInput">

                <div class="signature-actions">

                    <button type="button"
                    id="clearSig"
                    class="btn-add">

                    <i class="fa-solid fa-eraser"></i>
                    Effacer signature

                    </button>

                </div>

            </div>

            <!-- TOTAL -->

            <div class="total-card">

                <p>Total estimé</p>

                <h2 id="totalPrice">0.00 $</h2>

            </div>

            <!-- BTN -->

            <div class="text-center mt-4">

                <button type="submit"
                class="btn btn-hexa">

                <i class="fa-solid fa-file-circle-plus"></i>

                Générer la facture

                </button>

            </div>

        </form>

    </div>

</div>

<!-- JS -->

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({
    duration:900,
    once:true
});

/* SIGNATURE */

const canvas = document.getElementById("signature");

const signaturePad = new SignaturePad(canvas,{
    backgroundColor:'rgb(255,255,255)'
});

document.getElementById("clearSig").addEventListener("click",function(){

    signaturePad.clear();

});

document.querySelector("form").addEventListener("submit",function(){

    if(!signaturePad.isEmpty()){

        document.getElementById("signatureInput").value =
        signaturePad.toDataURL();

    }

});

/* AJOUT PRODUIT */

function ajouterProduit(){

    let container = document.getElementById("produits");

    let div = document.createElement("div");

    div.classList.add("product-card");

    div.innerHTML = `

    <button type="button"
    class="remove-product"
    onclick="this.parentElement.remove(); calculerTotal();">

    <i class="fa-solid fa-trash"></i>

    </button>

    <div class="form-grid">

        <div class="form-group">

            <label class="form-label">
                Produit
            </label>

            <input type="text"
            name="produit[]"
            class="form-control"
            placeholder="Nom produit"
            required>

        </div>

        <div class="form-group">

            <label class="form-label">
                Quantité
            </label>

            <input type="number"
            name="quantite[]"
            class="form-control quantity"
            value="1"
            required>

        </div>

        <div class="form-group">

            <label class="form-label">
                Prix unitaire
            </label>

            <input type="number"
            step="0.01"
            name="prix_unitaire[]"
            class="form-control price"
            placeholder="0.00"
            required>

        </div>

    </div>

    `;

    container.appendChild(div);

    attachEvents();

}

/* TOTAL */

function calculerTotal(){

    let quantities = document.querySelectorAll(".quantity");
    let prices = document.querySelectorAll(".price");

    let total = 0;

    quantities.forEach((q,index)=>{

        let qty = parseFloat(q.value) || 0;
        let price = parseFloat(prices[index].value) || 0;

        total += qty * price;

    });

    document.getElementById("totalPrice").innerText =
    total.toFixed(2) + " $";

}

function attachEvents(){

    document.querySelectorAll(".quantity,.price")
    .forEach(input=>{

        input.addEventListener("input",calculerTotal);

    });

}

attachEvents();

</script>

</body>

</html>
