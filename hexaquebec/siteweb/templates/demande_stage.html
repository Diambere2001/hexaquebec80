{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande de Stage | HexaQuébec</title>

<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b132b, #1c2541);
    color: white;
    font-family: 'Poppins', sans-serif;
}

/* HEADER */
.icon-title {
    width: 65px;
    height: 65px;
    margin: auto;
    border-radius: 50%;
    background: linear-gradient(135deg, #c6a87d, #a58b5e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: #0b132b;
    box-shadow: 0 8px 25px rgba(198,168,125,0.4);
}

.page-title {
    font-size: 2rem;
    font-weight: 700;
}

.page-subtitle {
    font-size: 0.95rem;
    color: #cbd5e1;
    max-width: 450px;
    margin: auto;
}

/* CARD */
.form-wrapper {
    display: flex;
    justify-content: center;
}

.form-card {
    width: 100%;
    max-width: 750px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
}

/* INPUT */
.input-group-text {
    background: rgba(255,255,255,0.08);
    border: none;
    color: #c6a87d;
}

.form-control {
    background: rgba(255,255,255,0.07);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 10px;
    font-size: 0.95rem;
}

.form-control:focus {
    background: rgba(255,255,255,0.12);
    color: #c6a87d;
    box-shadow: 0 0 0 2px #c6a87d;
}

/* LABEL */
label {
    font-size: 0.9rem;
    margin-bottom: 5px;
}

/* BUTTON */
.btn-hexa {
    background: linear-gradient(135deg, #c6a87d, #e0c097);
    border: none;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 10px;
    transition: 0.3s;
}
.btn-hexa:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(198,168,125,0.4);
}

/* RESPONSIVE */
@media(max-width:768px){
    .form-card {
        max-width: 95%;
        padding: 20px;
    }
    .page-title {
        font-size: 1.6rem;
    }
}
/* TITLE */
.page-title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 0.5px;
}

/* SUBTITLE */
.page-subtitle {
    font-size: 1rem;
    color: #cbd5e1;
    max-width: 500px;
    line-height: 1.6;
}

/* HIGHLIGHT BRAND */
.highlight {
    color: #c6a87d;
    font-weight: 600;
}

/* ICON ANIMATION */
.icon-title {
    animation: floatIcon 3s ease-in-out infinite;
}

@keyframes floatIcon {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container py-5">

<div class="text-center mb-5">

    <!-- ICON -->
    <div class="icon-title mb-4">
        <i class="fa-solid fa-graduation-cap"></i>
    </div>

    <!-- TITLE -->
    <h1 class="page-title mb-2">
        Demande de Stage
    </h1>

    <!-- SUBTITLE -->
    <p class="page-subtitle mx-auto">
        Rejoignez <span class="highlight">HexaQuébec</span> et développez vos compétences 
        dans le numérique 🚀 <br class="d-none d-md-block">
        Développement web, mobile et solutions innovantes.
    </p>

</div>
<!-- FORM -->
<div class="form-wrapper">
<div class="form-card">

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="row g-3">

<!-- NOM -->
<div class="col-md-6">
<label>Nom complet</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-user"></i></span>
<input type="text" name="nom" class="form-control" required>
</div>
</div>

<!-- EMAIL -->
<div class="col-md-6">
<label>Email</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-envelope"></i></span>
<input type="email" name="email" class="form-control" required>
</div>
</div>

<!-- NIVEAU -->
<div class="col-md-6">
<label><i class="fa-solid fa-graduation-cap"></i> Niveau d'étude</label>
<select name="niveau" class="form-control">
<option>Débutant</option>
<option>Intermédiaire</option>
<option>Avancé</option>
</select>
</div>

<!-- SPECIALITE -->
<div class="col-md-6">
<label><i class="fa-solid fa-laptop-code"></i> Spécialité</label>
<select name="specialite" class="form-control">
<option>Développement Web</option>
<option>Mobile</option>
<option>Design</option>
<option>Infographie</option>
<option>Maintenance informatique</option>
</select>
</div>

<!-- PROGRAMME -->
<div class="col-md-6">
<label><i class="fa-solid fa-book"></i> Programme</label>
<select name="programme_info" class="form-control">
<option value="">-- Sélectionner --</option>

<optgroup label="💻 Informatique">
<option>DEP - Soutien informatique</option>
<option>AEC - Programmation Web</option>
<option>AEC - Développement logiciel</option>
<option>DEC - Informatique</option>
</optgroup>

<optgroup label="🎨 Design">
<option>DEP - Infographie</option>
<option>AEC - Design graphique</option>
<option>DEC - Design graphique</option>
</optgroup>

</select>
</div>

<!-- DATE NAISSANCE -->
<div class="col-md-6">
<label><i class="fa-solid fa-calendar"></i> Date de naissance</label>
<input type="date" name="date_naissance" class="form-control">
</div>

<!-- LIEU NAISSANCE -->
<div class="col-md-6">
<label><i class="fa-solid fa-location-dot"></i> Lieu de naissance</label>
<input type="text" name="lieu_naissance" class="form-control">
</div>



<!-- DATE DEBUT -->
<div class="col-md-6">
<label>Date début stage</label>
<input type="date" name="date_debut" class="form-control">
</div>

<!-- CV -->
<div class="col-md-6">
<label>CV</label>
<input type="file" name="cv" class="form-control">
</div>

<!-- COMMENTAIRE -->
<div class="col-12">
<label>Commentaire</label>
<textarea name="commentaire" class="form-control" rows="3"></textarea>
</div>

</div>

<!-- BUTTON -->
<div class="d-flex justify-content-between mt-4">
<a href="/" class="btn btn-outline-light btn-sm">Retour</a>
<button type="submit" class="btn btn-hexa">
<i class="fa-solid fa-paper-plane"></i> Envoyer
</button>
</div>

</form>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
