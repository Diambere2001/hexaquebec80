{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement réussi | HexaQuébec</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
    --bg:#0b132b;
    --card:rgba(255,255,255,0.06);
    --accent:#c6a87d;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --success:#22c55e;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(-45deg,#0b132b,#1c2541,#3a506b,#0b132b);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
    color:var(--text);
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:var(--card);
    backdrop-filter: blur(12px);
    border-radius:18px;
    padding:40px;
    width:100%;
    max-width:420px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    animation:pop 0.6s ease;
}

@keyframes pop{
    from{transform:scale(0.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.icon{
    font-size:60px;
    color:var(--success);
    margin-bottom:10px;
    animation:check 1s ease;
}

@keyframes check{
    0%{transform:scale(0);}
    60%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

h1{
    font-size:22px;
    margin-bottom:10px;
}

p{
    color:var(--muted);
    margin:8px 0;
}

.amount{
    margin-top:15px;
    padding:10px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    font-weight:600;
    color:var(--accent);
}

.btn{
    display:block;
    margin-top:20px;
    padding:12px;
    border-radius:25px;
    text-decoration:none;
    background:linear-gradient(135deg,#c6a87d,#e8c395);
    color:#0b132b;
    font-weight:700;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.small{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="card">

    <div class="icon">
        <i class="fa-solid fa-circle-check"></i>
    </div>

    <h1>Paiement réussi</h1>

    <p>Merci pour votre confiance 🙏</p>

    <div class="amount">
        💰 {{ amount }} CAD
    </div>

    <a href="{% url 'paypal_checkout' %}" class="btn">
        Nouveau paiement
    </a>

    <p class="small">
        Transaction sécurisée via PayPal
    </p>

</div>

</div>

</body>
</html>
