<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Modifier facture</title>

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:auto;
margin-top:60px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.title{
font-size:26px;
margin-bottom:25px;
color:#2c3e50;
font-weight:bold;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
color:#555;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:5px;
font-size:14px;
}

button{
margin-top:10px;
padding:10px 18px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#219150;
}

.back{
display:inline-block;
margin-top:15px;
text-decoration:none;
color:#3498db;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2 class="title">✏️ Modifier la facture</h2>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>Nom du vendeur</label>
<input type="text" name="vendeur_nom" value="{{ facture.vendeur_nom }}">
</div>

<div class="form-group">
<label>Nom de l’acheteur</label>
<input type="text" name="acheteur_nom" value="{{ facture.acheteur_nom }}">
</div>

<div class="form-group">
<label>Produit / Service</label>
<input type="text" name="produit" value="{{ facture.produit }}">
</div>

<div class="form-group">
<label>Prix ($)</label>
<input type="number" name="prix" value="{{ facture.prix }}">
</div>

<div class="form-group">
<label>Date</label>
<input type="date" name="date" value="{{ facture.date|date:'Y-m-d' }}">
</div>

<button type="submit">
💾 Enregistrer les modifications
</button>

</form>

<a href="{% url 'facture_list' %}" class="back">
⬅ Retour aux factures
</a>

</div>

</div>

</body>

</html>
