<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Modifier facture</title>

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
margin-top:60px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.title{
font-size:26px;
margin-bottom:25px;
color:#2c3e50;
font-weight:bold;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
color:#555;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:5px;
font-size:14px;
}

button{
margin-top:10px;
padding:10px 18px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#219150;
}

.back{
display:inline-block;
margin-top:15px;
text-decoration:none;
color:#3498db;
}

.section-title{
margin-top:25px;
font-weight:bold;
color:#2c3e50;
}

.line-item{
border:1px solid #eee;
padding:10px;
margin-bottom:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2 class="title">✏️ Modifier la facture</h2>

<form method="POST">
{% csrf_token %}

<!-- FACTURE INFO -->
<div class="form-group">
<label>Nom du vendeur</label>
<input type="text" name="vendeur_nom" value="{{ facture.vendeur_nom }}">
</div>

<div class="form-group">
<label>Nom de l’acheteur</label>
<input type="text" name="acheteur_nom" value="{{ facture.acheteur_nom }}">
</div>

<div class="form-group">
<label>Date</label>
<input type="date" name="date" value="{{ facture.date|date:'Y-m-d' }}">
</div>

<!-- CLIENT ADRESSE -->
<div class="form-group">
<label>Adresse client</label>
<input type="text" name="adresse_client" value="{{ facture.adresse_client }}">
</div>

<div class="form-group">
<label>Ville</label>
<input type="text" name="ville_client" value="{{ facture.ville_client }}">
</div>

<div class="form-group">
<label>Code postal</label>
<input type="text" name="code_postal_client" value="{{ facture.code_postal_client }}">
</div>

<div class="form-group">
<label>Pays</label>
<input type="text" name="pays_client" value="{{ facture.pays_client }}">
</div>

<!-- PRODUITS -->
<div class="section-title">🧾 Produits</div>

{% for ligne in facture.lignes.all %}
<div class="line-item">

    <label>Produit</label>
    <input type="text" name="produit_{{ ligne.id }}" value="{{ ligne.produit }}">

    <label>Quantité</label>
    <input type="number" name="quantite_{{ ligne.id }}" value="{{ ligne.quantite }}">

    <label>Prix unitaire</label>
    <input type="number" step="0.01" name="prix_{{ ligne.id }}" value="{{ ligne.prix_unitaire }}">

</div>
{% endfor %}

<button type="submit">
💾 Enregistrer les modifications
</button>

</form>

<a href="{% url 'facture_list' %}" class="back">
⬅ Retour aux factures
</a>

</div>

</div>

</body>

</html>
