<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Stagiaire - HexaQuébec</title>

<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b132b, #1c2541);
    color: white;
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* CARD */
.login-card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 40px rgba(224,192,151,0.3);
    backdrop-filter: blur(12px);
    animation: fadeIn 0.6s ease;
}

/* TITLE ICON */
.icon-box {
    width: 60px;
    height: 60px;
    margin: auto;
    border-radius: 50%;
    background: linear-gradient(135deg,#c6a87d,#e0c097);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0b132b;
    font-size: 24px;
    margin-bottom: 15px;
}

/* INPUT */
.form-control {
    background: rgba(255,255,255,0.08) !important;
    border: none !important;
    color: white !important;
    border-radius: 10px;
    padding: 12px;
    transition: 0.3s;
}

.form-control:focus {
    background: rgba(255,255,255,0.15) !important;
    box-shadow: 0 0 0 2px #e0c097;
}

/* INPUT GROUP */
.input-group-text {
    background: rgba(255,255,255,0.08);
    border: none;
    color: #e0c097;
}

/* BUTTON */
.btn-login {
    background: linear-gradient(135deg,#c6a87d,#e0c097);
    border: none;
    color: #0b132b;
    font-weight: 600;
    border-radius: 10px;
    padding: 12px;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(224,192,151,0.5);
}

/* ALERT */
.alert {
    border-radius: 10px;
    font-size: 0.9rem;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:576px){
    .login-card {
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="login-card text-center">

    <div class="icon-box">
        <i class="fa-solid fa-user-graduate"></i>
    </div>

    <h4 class="mb-4 fw-bold">Connexion Stagiaire</h4>

    <!-- ✅ MESSAGES DJANGO -->
    {% if messages %}
        <div class="mb-3 text-start">
            {% for message in messages %}
                <div class="alert 
                    {% if message.tags == 'error' %}
                        alert-danger
                    {% elif message.tags == 'success' %}
                        alert-success
                    {% else %}
                        alert-warning
                    {% endif %}
                    alert-dismissible fade show" role="alert">

                    <i class="fa-solid fa-circle-info me-2"></i>
                    {{ message }}

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <!-- EMAIL -->
        <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="Votre email" required>
        </div>

        <!-- CODE -->
        <div class="input-group mb-3">
            <span class="input-group-text"><i class="fa fa-lock"></i></span>
            <input type="text" name="code" class="form-control" placeholder="Code d'accès" required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            <i class="fa-solid fa-right-to-bracket"></i> Se connecter
        </button>
    </form>

    <a href="/" class="btn btn-outline-light mt-3 w-100">
        <i class="fa-solid fa-arrow-left"></i> Retour
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
